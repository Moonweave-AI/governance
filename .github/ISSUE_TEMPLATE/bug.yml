name: Bug report
description: Report a reproducible defect
title: "[Bug] "
labels: ["type:bug", "needs:triage"]
body:
  - type: textarea
    id: context
    attributes: {label: Context}
    validations: {required: true}
  - type: textarea
    id: expected
    attributes: {label: Expected behavior}
    validations: {required: true}
  - type: textarea
    id: actual
    attributes: {label: Actual behavior and reproduction}
    validations: {required: true}
  - type: input
    id: version
    attributes: {label: Version / platform}
  - type: textarea
    id: evidence
    attributes: {label: Logs or evidence (redact secrets)}
