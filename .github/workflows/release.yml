name: Release

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: Run publish as a dry-run (no upload)
        required: false
        default: false
        type: boolean
  push:
    tags:
      - v*

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish to npm with provenance
    runs-on: ubuntu-latest
    environment: release
    defaults:
      run:
        working-directory: governance-skills
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: governance-skills/package-lock.json

      - name: Install
        run: npm ci

      - name: Verify (build adapters, validate, test, lint, eval)
        run: npm run verify

      - name: Self-audit (fail-on medium)
        run: npm run audit:self

      - name: Publish with provenance
        run: npm publish --provenance ${{ inputs.dry-run == true && '--dry-run' || '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
