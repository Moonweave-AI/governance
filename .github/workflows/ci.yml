name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
defaults:
  run:
    working-directory: governance-skills
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 24}
      - run: npm test
      - run: npm run lint:skills
      - run: npm run pack:check
